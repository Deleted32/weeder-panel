<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İndir Merkezi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;

  background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
  background-size: 400% 400%;
  animation: gradientBG 18s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ⭐ YILDIZLAR */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
}

.stars::before, .stars::after {
  content: "";
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  box-shadow:
    100px 200px white,
    300px 400px white,
    500px 100px white,
    800px 300px white,
    1200px 150px white,
    600px 500px white,
    900px 600px white,
    200px 700px white,
    1400px 400px white,
    1600px 200px white;
  animation: moveStars 60s linear infinite;
  opacity: 0.6;
}

.stars::after {
  animation-duration: 100s;
  opacity: 0.4;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}

/* LOGO (BÜYÜK + ARKA PLANSIZ GİBİ) */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 120px; /* büyüttük */
  cursor: pointer;
  transition: 0.3s;
  filter: drop-shadow(0 0 10px rgba(167,139,250,0.4));
}

/* hover */
.logo:hover {
  transform: scale(1.1) rotate(3deg);
  filter: drop-shadow(0 0 20px rgba(167,139,250,0.7));
}

/* Container */
.container {
  text-align: center;
  backdrop-filter: blur(20px);
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeUp 1s ease forwards;
  opacity: 0;
  transform: translateY(50px);
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUTON */
.btn {
  display: inline-block;
  margin: 12px;
  padding: 15px 35px;
  font-size: 16px;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  transition: 0.3s;
}

.btn::before {
  content: "";
  position: absolute;
  width: 0;
  height: 300%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  opacity: 0.3;
  transition: 0.5s;
}

.btn:hover::before {
  width: 220%;
}

.btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}

</style>
</head>
<body>

<div class="stars"></div>

<!-- LOGO -->
<img src="https://i.imgur.com/9Oobw1q_d.webp?maxwidth=1520&fidelity=grand" 
     class="logo"
     onclick="location.reload()">

<div class="container">
  <h1>İndir Merkezi 🚀</h1>

  <a href="buneboyle.zip" download class="btn">📦 Dosya 1 indir</a>
</div>

</body>
</html>
