<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İndir Merkezi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;

  background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
  background-size: 400% 400%;
  animation: gradientBG 18s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ⭐ GELİŞMİŞ YILDIZLAR */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* ÖN PLAN YILDIZLAR */
.stars::before {
  content: "";
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  box-shadow:
    60px 80px rgba(255,255,255,0.8),
    120px 200px rgba(255,255,255,0.6),
    200px 350px rgba(255,255,255,0.9),
    300px 120px rgba(255,255,255,0.7),
    400px 500px rgba(255,255,255,0.8),
    500px 300px rgba(255,255,255,0.6),
    600px 150px rgba(255,255,255,0.9),
    700px 450px rgba(255,255,255,0.7),
    800px 250px rgba(255,255,255,0.8),
    900px 100px rgba(255,255,255,0.6),
    1000px 400px rgba(255,255,255,0.9),
    1200px 200px rgba(255,255,255,0.7),
    1400px 350px rgba(255,255,255,0.8),
    1600px 150px rgba(255,255,255,0.6);

  animation: moveStars1 40s linear infinite;
  filter: drop-shadow(0 0 2px rgba(255,255,255,0.4));
}

/* ARKA PLAN YAVAŞ YILDIZLAR */
.stars::after {
  content: "";
  position: absolute;
  width: 3px;
  height: 3px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  box-shadow:
    80px 150px rgba(255,255,255,0.4),
    250px 300px rgba(255,255,255,0.5),
    450px 100px rgba(255,255,255,0.4),
    650px 400px rgba(255,255,255,0.5),
    850px 250px rgba(255,255,255,0.4),
    1050px 500px rgba(255,255,255,0.5),
    1250px 200px rgba(255,255,255,0.4),
    1450px 350px rgba(255,255,255,0.5);

  animation: moveStars2 60s linear infinite;
  filter: drop-shadow(0 0 3px rgba(255,255,255,0.3));
}

@keyframes moveStars1 {
  0% { transform: translate(0,0); }
  25% { transform: translate(25px,-30px); }
  50% { transform: translate(-30px,20px); }
  75% { transform: translate(20px,40px); }
  100% { transform: translate(0,0); }
}

@keyframes moveStars2 {
  0% { transform: translate(0,0); }
  25% { transform: translate(-20px,30px); }
  50% { transform: translate(30px,-20px); }
  75% { transform: translate(-40px,10px); }
  100% { transform: translate(0,0); }
}

/* 🐺 LOGO */
.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 220px;
  cursor: pointer;
  transition: 0.3s;
  filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
}

.logo:hover {
  transform: scale(1.1) rotate(3deg);
  filter: drop-shadow(0 0 35px rgba(56,189,248,0.8));
}

/* CONTAINER */
.container {
  text-align: center;
  backdrop-filter: blur(20px);
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeUp 1s ease forwards;
  opacity: 0;
  transform: translateY(50px);
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin: 12px;
  padding: 15px 35px;
  font-size: 16px;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  transition: 0.3s;
}

.btn::before {
  content: "";
  position: absolute;
  width: 0;
  height: 300%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  opacity: 0.3;
  transition: 0.5s;
}

.btn:hover::before {
  width: 220%;
}

.btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}

</style>
</head>
