<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> - Grim Client -</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #38bdf8;
    --secondary: #a78bfa;
    --accent: #06b6d4;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: white;
    background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
    background-size: 400% 400%;
    animation: gradientBG 18s ease infinite;
    overflow-x: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ⭐ GELİŞMİŞ YILDIZ ALANI */
  .stars {
    position: fixed;
    width: 100vw;
    height: 100vh;
    top: 0;
    left: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.5;
    animation: moveStar linear infinite;
  }

  @keyframes moveStar {
    from { transform: translate(0, 0); }
    to { transform: translate(var(--x), var(--y)); }
  }

  nav {
    width: 100%;
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .logo {
    width: 180px;
    cursor: pointer;
    filter: drop-shadow(0 0 15px rgba(167,139,250,0.5));
    transition: transform 0.3s ease;
  }

  .hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 5%;
    z-index: 10;
    gap: 60px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  .container {
    text-align: left;
    backdrop-filter: blur(18px);
    padding: 50px;
    border-radius: 25px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: fadeUp 1s ease forwards;
    max-width: 600px;
    width: 100%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-block;
    padding: 6px 15px;
    border-radius: 50px;
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.3);
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  h1 {
    font-size: 48px;
    line-height: 1.1;
    margin-bottom: 15px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  .subtitle {
    font-size: 16px;
    color: #cbd5e1;
    margin-bottom: 30px;
    font-weight: 300;
  }

  .button-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 14px 30px;
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    border: none;
  }

  .btn-primary {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 10px 20px rgba(167, 139, 250, 0.3);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.05);
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn:hover { transform: translateY(-3px); opacity: 0.9; }

  /* EK İNDİRMELER ALANI */
  #extra-section {
    display: none;
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid rgba(255,255,255,0.1);
    animation: fadeUp 0.6s ease forwards;
  }

  .download-card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    transition: 0.3s;
  }

  .download-card:hover { background: rgba(255,255,255,0.1); }

  .hero-img-wrapper { animation: float 6s ease-in-out infinite; }
  .right-img { width: 280px; filter: drop-shadow(0 0 25px rgba(56,189,248,0.4)); }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
  }

  @media (max-width: 900px) {
    .hero { flex-direction: column-reverse; text-align: center; }
    .container { text-align: center; }
    .button-group { justify-content: center; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<nav>
  <img src="https://media.discordapp.net/attachments/1395428805950308562/1494483127895195718/cca6e841-6fb2-4653-b36c-3fa775da7742.png?ex=69e2c55f&is=69e173df&hm=daece1b3428ca87776915676df33dd4668785a895087e63917d8c099183131e7&=&format=webp&quality=lossless&width=1619&height=1079" 
  class="logo" alt="Grim Logo" onclick="location.reload()">
</nav>

<div class="hero">
  <div class="container">
    <div class="badge">🔥 Yeni Güncelleme</div>
    <h1 id="main-title">Grim Client</h1>
    <p class="subtitle" id="main-desc">Minecraft Deneyiminizi En Üst Seviyeye Taşıyın. Sürüm 1.21.1</p>

    <div class="button-group" id="main-buttons">
      <a href="buneboyle.zip" download class="btn btn-primary">⚔️ Hemen İndir</a>
      <button onclick="toggleExtra()" class="btn btn-secondary">🩶 Diğerleri</button>
    </div>

    <div id="extra-section">
      <div class="download-card">
        <span>📦 Mod Paketi (v1.0)</span>
        <a href="dosya1.zip" download class="btn btn-secondary" style="padding: 8px 15px; font-size: 14px;">İndir</a>
      </div>
      <div class="download-card">
        <span>🎨 Özel Texture Pack</span>
        <a href="dosya2.zip" download class="btn btn-secondary" style="padding: 8px 15px; font-size: 14px;">İndir</a>
      </div>
      <div class="download-card">
        <span>⚙️ Grim Config Ayarları</span>
        <a href="dosya3.zip" download class="btn btn-secondary" style="padding: 8px 15px; font-size: 14px;">İndir</a>
      </div>
      <button onclick="toggleExtra()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px; font-size:12px; text-decoration:underline; width:100%;">← Geri Dön</button>
    </div>
  </div>

  <div class="hero-img-wrapper">
    <img src="https://media.discordapp.net/attachments/1395428805950308562/1494489825548566588/skin_clean_professional.png?ex=69e2cb9c&is=69e17a1c&hm=6ee859d45427f9938b41fa55903e6019ac56f5f16375b7dd02981dee04b42315&=&format=webp&quality=lossless&width=315&height=284" 
    class="right-img" alt="Character">
  </div>
</div>

<script>
// YILDIZ SİSTEMİ - Rastgele Yönlere Kayma
const starsContainer = document.getElementById("stars");
const count = 150;

for (let i = 0; i < count; i++) {
  const star = document.createElement("div");
  star.className = "star";
  const size = Math.random() * 3;
  star.style.width = size + "px";
  star.style.height = size + "px";
  
  // Başlangıç Pozisyonu
  star.style.left = Math.random() * 100 + "%";
  star.style.top = Math.random() * 100 + "%";
  
  // Rastgele Hedef (Her yöne kayma için)
  const xMove = (Math.random() - 0.5) * 200 + "px";
  const yMove = (Math.random() - 0.5) * 200 + "px";
  star.style.setProperty('--x', xMove);
  star.style.setProperty('--y', yMove);

  star.style.animationDuration = (Math.random() * 10 + 10) + "s";
  star.style.opacity = Math.random();
  starsContainer.appendChild(star);
}

// PANEL GEÇİŞİ
function toggleExtra() {
  const mainBtns = document.getElementById('main-buttons');
  const extraSec = document.getElementById('extra-section');
  const title = document.getElementById('main-title');

  if (extraSec.style.display === 'none' || extraSec.style.display === '') {
    mainBtns.style.display = 'none';
    extraSec.style.display = 'block';
    title.innerText = 'İndirmeler';
  } else {
    mainBtns.style.display = 'flex';
    extraSec.style.display = 'none';
    title.innerText = 'Grim Client';
  }
}
</script>

</body>
</html>
