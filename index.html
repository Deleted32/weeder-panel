<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İndir Merkezi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: white;

  background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
  background-size: 400% 400%;
  animation: gradientBG 18s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ⭐ STAR FIELD (OPTİMİZE) */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: drift linear infinite;
  box-shadow: 0 0 6px rgba(255,255,255,0.3);
}

@keyframes drift {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(30px, -20px); }
  50%  { transform: translate(-20px, 30px); }
  75%  { transform: translate(20px, 20px); }
  100% { transform: translate(0px, 0px); }
}

/* LOGO SOL */
.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 220px;
  cursor: pointer;
  filter: drop-shadow(0 0 18px rgba(167,139,250,0.5));
  transition: 0.3s;
}

.logo:hover {
  transform: scale(1.08);
}

/* SAĞ GÖRSEL */
.right-img {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 220px;
  filter: drop-shadow(0 0 18px rgba(56,189,248,0.5));
  transition: 0.3s;
}

.right-img:hover {
  transform: scale(1.08);
}

/* ORTA KUTU */
.container {
  text-align: center;
  backdrop-filter: blur(18px);
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeUp 1s ease forwards;
  opacity: 0;
  transform: translateY(40px);
  z-index: 10;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  display: inline-block;
  margin: 12px;
  padding: 15px 35px;
  font-size: 16px;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 15px rgba(167,139,250,0.25);
}

.btn::before {
  content: "";
  position: absolute;
  width: 0;
  height: 300%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  opacity: 0.25;
  transition: 0.4s;
}

.btn:hover::before {
  width: 220%;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- SOL LOGO -->
<img src="https://media.discordapp.net/attachments/1395428805950308562/1494483127895195718/cca6e841-6fb2-4653-b36c-3fa775da7742.png?ex=69e2c55f&is=69e173df&hm=daece1b3428ca87776915676df33dd4668785a895087e63917d8c099183131e7&=&format=webp&quality=lossless&width=1619&height=1079"
class="logo"
onclick="location.reload()">

<!-- SAĞ GÖRSEL -->
<img src="https://media.discordapp.net/attachments/1395428805950308562/1494487905727549543/pack.png?ex=69e2c9d2&is=69e17852&hm=a3c8043bc844308d54230107f457e1d558472bd3e40af83a3f1efeeccf3c095a&=&format=webp&quality=lossless&width=315&height=284"
class="right-img">

<div class="container">
  <h1>Grim'mi İndircen La 🚀</h1>
  <h2>Tıkla indir</h2>

  <a href="buneboyle.zip" download class="btn">⚔️ Grim Client</a>
  <a href="buneboyle.zip" download class="btn">⚔️ Grim Client</a>
</div>

<script>
const stars = document.getElementById("stars");

// 🔥 FPS DOSTU YILDIZ SAYISI
const STAR_COUNT = 90;

for (let i = 0; i < STAR_COUNT; i++) {
  const s = document.createElement("div");
  s.className = "star";

  const size = Math.random() * 2.5 + 1;
  s.style.width = size + "px";
  s.style.height = size + "px";

  s.style.left = Math.random() * 100 + "%";
  s.style.top = Math.random() * 100 + "%";

  s.style.opacity = Math.random() * 0.6 + 0.2;

  const duration = Math.random() * 8 + 6;
  s.style.animationDuration = duration + "s";

  stars.appendChild(s);
}
</script>

</body>
</html>
