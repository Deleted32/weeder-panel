<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> - Grim Client -</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #38bdf8;
    --secondary: #a78bfa;
    --accent: #06b6d4;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: white;
    background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
    background-size: 400% 400%;
    animation: gradientBG 18s ease infinite;
    overflow-x: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ⭐ STAR FIELD */
  .stars {
    position: fixed;
    width: 100vw;
    height: 100vh;
    top: 0;
    left: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.5;
    animation: flyAway linear infinite;
    box-shadow: 0 0 6px rgba(255,255,255,0.25);
  }

  @keyframes flyAway {
    0%   { transform: translate(0px, 0px); }
    100% { transform: translate(var(--tx), var(--ty)); }
  }

  /* --- ŞİFRE EKRANI STİLLERİ --- */
  #password-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    background: rgba(2, 6, 23, 0.7);
    backdrop-filter: blur(10px);
  }

  .password-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    max-width: 400px;
    text-align: center;
  }

  .pass-input {
    width: 100%;
    padding: 15px 20px;
    margin-top: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
    text-align: center;
  }

  .pass-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
  }

  /* --- ANA SİTEYİ GİZLEYEN WRAPPER --- */
  #main-wrapper {
    display: none;
    width: 100%;
    min-height: 100vh;
    flex-direction: column;
  }

  /* MODERN NAVBAR */
  nav {
    width: 100%;
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .logo {
    width: 180px;
    cursor: pointer;
    filter: drop-shadow(0 0 15px rgba(167,139,250,0.5));
    transition: transform 0.3s ease;
  }

  .logo:hover {
    transform: scale(1.05);
  }

  /* ANA İÇERİK DÜZENİ */
  .hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 5%;
    z-index: 10;
    gap: 60px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  .left-column {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 600px;
  }

  .container {
    text-align: left; 
    backdrop-filter: blur(18px);
    padding: 50px;
    border-radius: 25px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: fadeUp 1s ease forwards;
    opacity: 0;
    transform: translateY(40px);
    width: 100%;
  }

  /* Diğerleri Bölümü İçin Özel Şifre Paneli */
  #extra-auth-container {
    display: none;
    padding: 30px 40px;
    text-align: center;
  }

  #extra-container {
    display: none;
    padding: 30px 50px;
    animation: slideDown 0.5s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Rozet Tasarımı */
  .badge {
    display: inline-block;
    padding: 6px 15px;
    border-radius: 50px;
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.3);
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  h1 {
    font-size: 48px;
    line-height: 1.1;
    margin-bottom: 15px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  p.subtitle {
    font-size: 16px;
    color: #cbd5e1;
    margin-bottom: 30px;
    line-height: 1.6;
    font-weight: 300;
  }

  /* BUTONLAR */
  .button-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 14px 30px;
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    border: none;
  }

  .btn-primary {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 10px 20px rgba(167, 139, 250, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 25px rgba(167, 139, 250, 0.5);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.05);
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-3px);
  }

  .hero-img-wrapper {
    animation: float 6s ease-in-out infinite;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .right-img {
    width: 280px;
    filter: drop-shadow(0 0 25px rgba(56,189,248,0.4));
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
  }

  @media (max-width: 900px) {
    .hero { flex-direction: column-reverse; text-align: center; }
    .left-column { align-items: center; }
    .container { text-align: center; padding: 30px 20px; }
    .button-group { justify-content: center; }
    .right-img { width: 200px; }
    h1 { font-size: 36px; }
  }
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div id="password-screen">
  <img src="https://media.discordapp.net/attachments/1395428805950308562/1494483127895195718/cca6e841-6fb2-4653-b36c-3fa775da7742.png?ex=69e2c55f&is=69e173df&hm=daece1b3428ca87776915676df33dd4668785a895087e63917d8c099183131e7&=&format=webp&quality=lossless&width=1619&height=1079" class="logo" alt="Grim Logo" style="margin-bottom: 20px;">
  
  <div class="container password-container">
    <h2 style="font-size: 24px; color: white; margin-bottom: 10px;">Erişim Korumalı</h2>
    <p class="subtitle" style="margin-bottom: 10px; font-size: 14px;">Siteyi görüntülemek için şifreyi girin.</p>
    
    <input type="password" id="password-input" class="pass-input" placeholder="Şifre...">
    <p id="error-msg" style="color: #ef4444; margin-top: 10px; font-size: 14px; display: none;">Hatalı şifre!</p>
    
    <button onclick="checkPassword()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Giriş Yap</button>
  </div>
</div>

<div id="main-wrapper">
  <nav>
    <img src="https://media.discordapp.net/attachments/1395428805950308562/1494483127895195718/cca6e841-6fb2-4653-b36c-3fa775da7742.png?ex=69e2c55f&is=69e173df&hm=daece1b3428ca87776915676df33dd4668785a895087e63917d8c099183131e7&=&format=webp&quality=lossless&width=1619&height=1079"
    class="logo" alt="Grim Logo" onclick="location.reload()">
  </nav>

  <div class="hero">
    <div class="left-column">
      <div class="container" id="main-content">
        <div class="badge">🔥</div>
        <h1 id="content-title">Grim Client</h1>
        <p class="subtitle" id="content-desc">SÜRÜM 1.21.1</p>

        <div class="button-group">
          <a href="buneboyle.zip" download class="btn btn-primary">⚔️ Hemen İndir</a>
          <a onclick="showExtraAuth()" class="btn btn-secondary">🩶 Diğerleri</a>
        </div>
      </div>

      <div class="container" id="extra-auth-container">
        <h2 style="font-size: 18px; color: var(--primary); margin-bottom: 15px;">Erişim Şifresi Gerekli</h2>
        <input type="password" id="extra-pass-input" class="pass-input" placeholder="Bölüm şifresi..." style="margin-top: 0;">
        <button onclick="checkExtraPassword()" class="btn btn-primary" style="width: 100%; margin-top: 15px; padding: 10px;">Dosyaları Göster</button>
      </div>

      <div class="container" id="extra-container">
        <h2 style="font-size: 20px; margin-bottom: 20px; color: var(--secondary);">Ekstra Dosyalar</h2>
        <div class="button-group">
          <a href="Vulcan.jar" download class="btn btn-secondary">📦 Vulcan Plugin</a>
          <a href="pack.zip" download class="btn btn-secondary">🎨 Nivoria Pack</a>
          <a href="kurt.webp" download class="btn btn-secondary">🐺 Kurt Logo</a>
          <a href="DeluxeMenus.jar" download class="btn btn-secondary">📦 Deluxe Menu</a>
          <a href="Citizens.jar" download class="btn btn-secondary">📦 Citizens</a>
          <a href="DeluxeCombat.jar" download class="btn btn-secondary">📦 Deluxe Combat</a>
        </div>
      </div>
    </div>

    <div class="hero-img-wrapper">
      <img src="https://media.discordapp.net/attachments/1395428805950308562/1494489825548566588/skin_clean_professional.png?ex=69e2cb9c&is=69e17a1c&hm=6ee859d45427f9938b41fa55903e6019ac56f5f16375b7dd02981dee04b42315&=&format=webp&quality=lossless&width=315&height=284"
      class="right-img" alt="Grim Client Character">
    </div>
  </div>
</div>

<script>
// --- ANA ŞİFRE KONTROLÜ ---
function checkPassword() {
  const inputVal = document.getElementById("password-input").value;
  const errorMsg = document.getElementById("error-msg");
  if(inputVal === "Nivoriapopo" || inputVal === "Nivoriapopo") {
    document.getElementById("password-screen").style.display = "none";
    document.getElementById("main-wrapper").style.display = "flex";
  } else {
    errorMsg.style.display = "block";
    document.getElementById("password-input").value = "";
  }
}

// --- DİĞERLERİ KISMI ŞİFRE KONTROLÜ ---
function showExtraAuth() {
  const authCont = document.getElementById("extra-auth-container");
  const extraCont = document.getElementById("extra-container");
  
  // Zaten açıksa kapat, kapalıysa şifre sorma panelini aç
  if(authCont.style.display === "block" || extraCont.style.display === "block") {
    authCont.style.display = "none";
    extraCont.style.display = "none";
  } else {
    authCont.style.display = "block";
  }
}

function checkExtraPassword() {
  const pass = document.getElementById("extra-pass-input").value;
  if(pass === "plugin") {
    document.getElementById("extra-auth-container").style.display = "none";
    document.getElementById("extra-container").style.display = "block";
  } else {
    alert("Hatalı bölüm şifresi!");
    document.getElementById("extra-pass-input").value = "";
  }
}

// Klavye Enter Desteği
document.getElementById("password-input").addEventListener("keypress", (e) => { if(e.key === "Enter") checkPassword(); });
document.getElementById("extra-pass-input").addEventListener("keypress", (e) => { if(e.key === "Enter") checkExtraPassword(); });

// --- YILDIZLAR ---
const stars = document.getElementById("stars");
for (let i = 0; i < 250; i++) {
  const s = document.createElement("div");
  s.className = "star";
  const size = Math.random() * 2.5 + 1;
  s.style.width = size + "px";
  s.style.height = size + "px";
  s.style.left = Math.random() * 100 + "%";
  s.style.top = Math.random() * 100 + "%";
  const tx = (Math.random() - 0.5) * 200 + "vw"; 
  const ty = (Math.random() - 0.5) * 200 + "vh";
  s.style.setProperty('--tx', tx);
  s.style.setProperty('--ty', ty);
  s.style.animationDuration = (Math.random() * 15 + 10) + "s";
  stars.appendChild(s);
}
</script>

</body>
</html>
