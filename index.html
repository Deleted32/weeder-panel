<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İndir Merkezi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;

  background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
  background-size: 400% 400%;
  animation: gradientBG 18s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* STAR LAYER */
.stars {
  position: absolute;
  width: 120%;
  height: 120%;
  left: -10%;
  top: -10%;
  pointer-events: none;
  will-change: transform;
}

/* tek yıldız */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
  animation: floatStar linear infinite;
}

@keyframes floatStar {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

/* LOGO */
.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 220px;
  cursor: pointer;
  transition: 0.3s;
  filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
}

.logo:hover {
  transform: scale(1.1) rotate(3deg);
  filter: drop-shadow(0 0 35px rgba(56,189,248,0.8));
}

/* CONTAINER */
.container {
  text-align: center;
  backdrop-filter: blur(20px);
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeUp 1s ease forwards;
  opacity: 0;
  transform: translateY(50px);
  z-index: 10;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  display: inline-block;
  margin: 12px;
  padding: 15px 35px;
  font-size: 16px;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  transition: 0.3s;
}

.btn::before {
  content: "";
  position: absolute;
  width: 0;
  height: 300%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  opacity: 0.3;
  transition: 0.5s;
}

.btn:hover::before {
  width: 220%;
}

.btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<img src="https://media.discordapp.net/attachments/1395428805950308562/1494483127895195718/cca6e841-6fb2-4653-b36c-3fa775da7742.png"
class="logo"
onclick="location.reload()">

<div class="container">
  <h1>Grim'mi İndircen La 🚀</h1>
  <h2>Tıkla indir</h2>
  <a href="buneboyle.zip" download class="btn">⚔️ Grim Client</a>
  <a href="buneboyle.zip" download class="btn">⚔️ Grim Client</a>
</div>

<script>
const starsContainer = document.getElementById("stars");

// ⭐ DAHA FAZLA YILDIZ
const STAR_COUNT = 320;

for (let i = 0; i < STAR_COUNT; i++) {
  const star = document.createElement("div");
  star.classList.add("star");

  const size = Math.random() * 3 + 1;
  star.style.width = size + "px";
  star.style.height = size + "px";

  star.style.left = Math.random() * 120 + "%";
  star.style.top = Math.random() * 120 + "%";

  star.style.opacity = Math.random();

  const duration = Math.random() * 5 + 3;
  star.style.animationDuration = duration + "s";

  starsContainer.appendChild(star);
}

// 🖱️ MOUSE PARALLAX
document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 40;
  const y = (e.clientY / window.innerHeight - 0.5) * 40;

  starsContainer.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
