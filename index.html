<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İndir Merkezi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;

  background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
  background-size: 400% 400%;
  animation: gradientBG 18s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ⭐ DAHA DOĞAL YILDIZ */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
}

.stars::before {
  content: "";
  position: absolute;
  width: 1px;
  height: 1px;
  background: white;
  box-shadow:
    50px 100px white, 200px 300px white, 400px 150px white,
    600px 250px white, 800px 100px white, 1000px 300px white,
    1200px 200px white, 1400px 350px white, 1600px 150px white;
  animation: starsMove 80s linear infinite;
  opacity: 0.7;
}

@keyframes starsMove {
  from { transform: translateY(0); }
  to { transform: translateY(-1200px); }
}

/* 🐺 LOGO (ŞEFFAF + BÜYÜK) */
.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 180px;
  cursor: pointer;
  transition: 0.3s;
  filter: drop-shadow(0 0 15px rgba(167,139,250,0.5));
}

.logo:hover {
  transform: scale(1.1) rotate(3deg);
  filter: drop-shadow(0 0 25px rgba(167,139,250,0.8));
}

/* Container */
.container {
  text-align: center;
  backdrop-filter: blur(20px);
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeUp 1s ease forwards;
  opacity: 0;
  transform: translateY(50px);
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUTON */
.btn {
  display: inline-block;
  margin: 12px;
  padding: 15px 35px;
  font-size: 16px;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  transition: 0.3s;
}

.btn::before {
  content: "";
  position: absolute;
  width: 0;
  height: 300%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  opacity: 0.3;
  transition: 0.5s;
}

.btn:hover::before {
  width: 220%;
}

.btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}

</style>
</head>
<body>

<div class="stars"></div>

<!-- ŞEFFAF KURT -->

     class="logo"
     onclick="location.reload()">

  <h1>İndir Merkezi 🚀</h1>

</div>

</body>
</html>
