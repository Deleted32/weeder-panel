<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İndir Merkezi</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
      background: linear-gradient(-45deg, #0f172a, #1e3a8a, #7c3aed, #06b6d4);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Hafif glow noktalar */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(167,139,250,0.3), transparent);
      top: -200px;
      left: -200px;
      filter: blur(100px);
      animation: float 10s infinite alternate;
    }

    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.3), transparent);
      bottom: -200px;
      right: -200px;
      filter: blur(100px);
      animation: float 12s infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(50px); }
    }

    .container {
      text-align: center;
      backdrop-filter: blur(20px);
      padding: 50px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      animation: fadeUp 1s ease forwards;
      opacity: 0;
      transform: translateY(50px);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 42px;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      display: inline-block;
      margin: 12px;
      padding: 15px 35px;
      font-size: 16px;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      transition: 0.3s;
    }

    /* Neon border efekti */
    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 2px;
      background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: 0.3s;
    }

    /* Glow swipe */
    .btn::before {
      content: "";
      position: absolute;
      width: 0;
      height: 300%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      background: linear-gradient(90deg, #38bdf8, #a78bfa);
      opacity: 0.4;
      transition: 0.5s;
    }

    .btn:hover::before {
      width: 220%;
    }

    .btn:hover::after {
      opacity: 1;
    }

    .btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.6);
    }

    /* Buton giriş animasyonu */
    .btn {
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    .btn:nth-child(2) { animation-delay: 0.4s; }
    .btn:nth-child(3) { animation-delay: 0.7s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>İndir Merkezi 🚀</h1>

    <a href="buneboyle.zip" download class="btn">📦 Dosya 1 indir</a>
  </div>

</body>
</html>
