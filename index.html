<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İndir Merkezi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;

  /* KOYU ama animasyonlu gradient */
  background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
  background-size: 400% 400%;
  animation: gradientBG 18s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Arka plan glow (daha az parlak) */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(167,139,250,0.15), transparent);
  top: -150px;
  left: -150px;
  filter: blur(120px);
}

body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(56,189,248,0.15), transparent);
  bottom: -150px;
  right: -150px;
  filter: blur(120px);
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 70px;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.3s;
}

/* Logo hover efekti */
.logo:hover {
  transform: scale(1.1) rotate(5deg);
  box-shadow: 0 0 20px rgba(167,139,250,0.4);
}

/* Logo arka glow */
.logo::after {
  content: "";
  position: absolute;
  inset: -5px;
  border-radius: 15px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
  z-index: -1;
  opacity: 0;
  filter: blur(15px);
  transition: 0.3s;
}

.logo:hover::after {
  opacity: 1;
}

/* Container */
.container {
  text-align: center;
  backdrop-filter: blur(20px);
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeUp 1s ease forwards;
  opacity: 0;
  transform: translateY(50px);
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUTON */
.btn {
  display: inline-block;
  margin: 12px;
  padding: 15px 35px;
  font-size: 16px;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  transition: 0.3s;
}

/* Hover ışık */
.btn::before {
  content: "";
  position: absolute;
  width: 0;
  height: 300%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  opacity: 0.3;
  transition: 0.5s;
}

.btn:hover::before {
  width: 220%;
}

.btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}

</style>
</head>
<body>

<!-- LOGO -->
<img src="https://i.imgur.com/9Oobw1q_d.webp?maxwidth=1520&fidelity=grand" 
     class="logo"
     onclick="location.reload()">

<div class="container">
  <h1>İndir Merkezi 🚀</h1>

  <a href="dosya1.zip" download class="btn">📦 Dosya 1 indir</a>
  <a href="dosya2.pdf" download class="btn">📄 Dosya 2 indir</a>
</div>

</body>
</html>
